name: Table Scraper QA (22f3000722@ds.study.iitm.ac.in)

on:
  workflow_dispatch:  # Manual trigger button
  push:
    branches: [ main ]

jobs:
  scrape:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Scrape and sum tables (22f3000722@ds.study.iitm.ac.in)
      run: npm run scrape
      
    - name: Upload logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: scrape-logs
        path: |
          *.log
          playwright-report/
