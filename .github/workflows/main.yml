name: DataDash QA Scraper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape-and-sum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      # REQUIRED STEP: Email address in the name
      - name: Run Scraper for 22f3000722@ds.study.iitm.ac.in
        run: node scrape.js
